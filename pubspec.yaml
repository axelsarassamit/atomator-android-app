name: atomator_app
description: Atomator - Remote Linux Fleet Management
publish_to: 'none'
version: 1.2.25+36

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  dartssh2: ^2.10.0
  provider: ^6.1.0
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0
  path_provider: ^2.1.0
  intl: ^0.19.0
  open_filex: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/splash_logo.png
    - assets/images/atomator_banner.png
    - assets/images/app_icon.png
