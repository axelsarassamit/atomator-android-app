name: Build APK

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.0
          channel: stable

      - name: Backup source
        run: cp -r lib lib_bak && cp -r assets assets_bak && cp pubspec.yaml pubspec_bak.yaml

      - name: Create project
        run: flutter create --project-name atomator_app .

      - name: Restore source
        run: rm -rf lib assets pubspec.yaml && mv lib_bak lib && mv assets_bak assets && mv pubspec_bak.yaml pubspec.yaml

      - name: Patch Android config
        run: |
          python3 << 'PYEOF'
          import re

          # Fix app name in AndroidManifest
          with open('android/app/src/main/AndroidManifest.xml', 'r') as f:
              m = f.read()
          m = m.replace('android:label="atomator_app"', 'android:label="Atomator"')
          with open('android/app/src/main/AndroidManifest.xml', 'w') as f:
              f.write(m)

          # Fix NDK version in build.gradle.kts
          with open('android/app/build.gradle.kts', 'r') as f:
              b = f.read()
          b = b.replace('android {', 'android {
        ndkVersion = "27.0.12077973"', 1)
          with open('android/app/build.gradle.kts', 'w') as f:
              f.write(b)

          # Add Google Maven mirror to settings.gradle.kts
          with open('android/settings.gradle.kts', 'r') as f:
              s = f.read()
          s = s.replace('gradlePluginPortal()', 'google()\n                gradlePluginPortal()')
          s = s.replace('mavenCentral()', 'google()\n                mavenCentral()')
          with open('android/settings.gradle.kts', 'w') as f:
              f.write(s)
          PYEOF

      - name: Dependencies
        run: flutter pub get

      - name: Generate app icon
        run: dart run flutter_launcher_icons

      - name: Build
        run: flutter build apk

      - name: Rename
        run: cp build/app/outputs/flutter-apk/app-release.apk "atomator.${{ steps.version.outputs.version }}.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: atomator-${{ steps.version.outputs.version }}
          path: "atomator.${{ steps.version.outputs.version }}.apk"

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: "atomator.${{ steps.version.outputs.version }}.apk"
          name: "Atomator Mobile ${{ steps.version.outputs.version }}"
