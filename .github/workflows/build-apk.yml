name: Build APK

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.0
          channel: stable

      - name: Backup source
        run: cp -r lib lib_bak && cp -r assets assets_bak && cp pubspec.yaml pubspec_bak.yaml

      - name: Clean and create project
        run: |
          rm -rf android ios web linux macos windows test
          flutter create --project-name atomator_app .

      - name: Restore source
        run: rm -rf lib assets pubspec.yaml && mv lib_bak lib && mv assets_bak assets && mv pubspec_bak.yaml pubspec.yaml

      - name: Patch Android config
        run: |
          python3 -c "
          # Fix app name
          f = open('android/app/src/main/AndroidManifest.xml'); c = f.read(); f.close()
          c = c.replace('android:label="atomator_app"', 'android:label="Atomator"')
          f = open('android/app/src/main/AndroidManifest.xml', 'w'); f.write(c); f.close()

          # Fix NDK
          f = open('android/app/build.gradle.kts'); c = f.read(); f.close()
          c = c.replace('android {', 'android {\n        ndkVersion = "27.0.12077973"', 1)
          f = open('android/app/build.gradle.kts', 'w'); f.write(c); f.close()

          # Add Google Maven mirror
          f = open('android/settings.gradle.kts'); c = f.read(); f.close()
          c = c.replace('gradlePluginPortal()', 'google()\n                gradlePluginPortal()')
          f = open('android/settings.gradle.kts', 'w'); f.write(c); f.close()
          "

      - name: Dependencies
        run: flutter pub get

      - name: Generate app icon
        run: dart run flutter_launcher_icons

      - name: Build
        run: flutter build apk

      - name: Rename
        run: cp build/app/outputs/flutter-apk/app-release.apk "atomator.${{ steps.version.outputs.version }}.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: atomator-${{ steps.version.outputs.version }}
          path: "atomator.${{ steps.version.outputs.version }}.apk"

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: "atomator.${{ steps.version.outputs.version }}.apk"
          name: "Atomator Mobile ${{ steps.version.outputs.version }}"
