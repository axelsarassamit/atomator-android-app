name: Build APK

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.0
          channel: stable

      - name: Backup source
        run: cp -r lib lib_bak && cp -r assets assets_bak && cp pubspec.yaml pubspec_bak.yaml

      - name: Create project
        run: flutter create --project-name atomator_app .

      - name: Restore source
        run: rm -rf lib assets pubspec.yaml && mv lib_bak lib && mv assets_bak assets && mv pubspec_bak.yaml pubspec.yaml

      - name: Fix app name, NDK, and Maven repos
        run: |
          sed -i 's/android:label="atomator_app"/android:label="Atomator"/' android/app/src/main/AndroidManifest.xml
          sed -i '/android {/a\        ndkVersion = "27.0.12077973"' android/app/build.gradle.kts

          # Fix Maven Central 403 by adding mirrors to settings.gradle.kts
          cat > /tmp/fix_repos.py << 'PYEOF'
          import re
          with open('android/settings.gradle.kts', 'r') as f:
              content = f.read()
          # Add maven mirrors before any mavenCentral() call
          content = content.replace(
              'mavenCentral()',
              '''maven { url = uri("https://maven.google.com") }
                mavenCentral()
                maven { url = uri("https://jcenter.bintray.com") }'''
          )
          # Also ensure pluginManagement has google() first
          content = content.replace(
              'gradlePluginPortal()',
              '''google()
                gradlePluginPortal()'''
          )
          with open('android/settings.gradle.kts', 'w') as f:
              f.write(content)
          PYEOF
          python3 /tmp/fix_repos.py

      - name: Dependencies
        run: flutter pub get

      - name: Generate app icon
        run: dart run flutter_launcher_icons

      - name: Build
        run: flutter build apk

      - name: Rename
        run: cp build/app/outputs/flutter-apk/app-release.apk "atomator.${{ steps.version.outputs.version }}.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: atomator-${{ steps.version.outputs.version }}
          path: "atomator.${{ steps.version.outputs.version }}.apk"

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: "atomator.${{ steps.version.outputs.version }}.apk"
          name: "Atomator Mobile ${{ steps.version.outputs.version }}"
